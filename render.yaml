services:
  # FastAPI web service — receives GitHub webhooks, serves API
  - type: web
    name: code-review-agent
    runtime: image
    repo: https://github.com/Bisma474/github-code-review-agent
    region: oregon
    plan: free
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: code-review-agent
          property: port
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-db
          property: connectionString
      - key: CELERY_ALWAYS_EAGER
        value: "true"

  # Celery worker (optional — remove if using free tier with CELERY_ALWAYS_EAGER)
  - type: worker
    name: code-review-worker
    runtime: image
    repo: https://github.com/Bisma474/github-code-review-agent
    region: oregon
    plan: starter
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
    command: celery -A app.celery_app worker --loglevel=info --queues=review,default --concurrency=2

  # PostgreSQL (free tier — 1GB)
  - type: postgres
    name: code-review-db
    plan: free

  # Redis (for Celery worker — skip if using eager mode)
  - type: redis
    name: code-review-redis
    plan: free
    maxmemoryPolicy: noeviction
