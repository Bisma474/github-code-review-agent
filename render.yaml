services:
  # FastAPI web service — receives GitHub webhooks, serves API
  - type: web
    name: code-review-agent
    runtime: docker
    repo: https://github.com/Bisma474/github-code-review-agent
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: code-review-agent
          property: port
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CELERY_ALWAYS_EAGER
        value: "true"
